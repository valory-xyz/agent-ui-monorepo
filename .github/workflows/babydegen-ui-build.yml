name: Build and Release BabyDegen UI

on:
  push:
    tags:
      - 'v*-modius'
      - 'v*-optimus'
      - 'v*-basius'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-app.yml
    permissions:
      contents: write
    with:
      app-name: babydegen-ui
      # Tag suffix → REACT_APP_AGENT_NAME mapping (v*-modius → modius;
      # v*-basius → basius; everything else falling under this workflow's tag
      # pattern is v*-optimus → optimus).
      agent-env: ${{ endsWith(github.ref_name, '-modius') && 'modius' || endsWith(github.ref_name, '-basius') && 'basius' || 'optimus' }}
