name: Snyk Security

# Snyk SCA + SAST scan, modelled on autonolas-frontend-mono's reference
# workflow. Org parity item from the supply-chain plan §3.5.
#
# DORMANT UNTIL SET UP. Two admin actions required before this workflow
# actually does anything (see SUPPLY-CHAIN-SECURITY.md §"Snyk setup"):
#   1. The repo must be added to the Valory Snyk org's monitored list.
#      Org-wide license does NOT auto-cover new repos.
#   2. Add `SNYK_TOKEN` as a repo secret (Settings → Secrets and variables
#      → Actions → New repository secret).
# Until both are done, the workflow runs but exits cleanly with a notice.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  snyk:
    name: Snyk SCA + SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read         # for actions/checkout
      security-events: write # for github/codeql-action/upload-sarif
      actions: read

    steps:
      - name: Detect SNYK_TOKEN presence
        id: token
        env:
          HAS_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
        run: |
          if [[ "$HAS_TOKEN" == "true" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::SNYK_TOKEN secret is not configured. Workflow will exit cleanly. See SUPPLY-CHAIN-SECURITY.md §'Snyk setup' for setup steps."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        if: steps.token.outputs.present == 'true'
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      - name: Activate pinned Yarn via Corepack
        if: steps.token.outputs.present == 'true'
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }

      - name: Install dependencies
        if: steps.token.outputs.present == 'true'
        # Mirror the audit job's defence: install hooks are gated separately
        # in supply-chain.yml. Skipping scripts here keeps SNYK_TOKEN out of
        # reach of any postinstall script.
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Setup Snyk CLI
        if: steps.token.outputs.present == 'true'
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      # NOTE: SNYK_TOKEN is scoped per-step, not at the job level. A job-level
      # env: would make it readable by every step, including yarn install where
      # a compromised postinstall could exfiltrate it. See
      # SUPPLY-CHAIN-SECURITY.md §"Secrets hygiene".
      - name: Verify Snyk authentication
        if: steps.token.outputs.present == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "$SNYK_TOKEN" || { echo "::error::Snyk authentication failed — check token validity"; exit 1; }

      - name: Snyk Code (SAST)
        if: steps.token.outputs.present == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # `|| true` keeps the step from failing the workflow on findings;
        # findings are uploaded to GitHub Code Scanning instead so they
        # surface in the Security tab and on PR Files-changed view.
        run: snyk code test --sarif > snyk-code.sarif 2>&1 || true
        continue-on-error: true

      - name: Snyk Open Source monitor (SCA)
        if: steps.token.outputs.present == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Monitor the root package.json only (single-tree monorepo via Nx).
        run: snyk monitor --file=package.json --project-name="agent-ui-monorepo" || true
        continue-on-error: true

      - name: Validate SARIF before upload
        if: steps.token.outputs.present == 'true'
        id: validate_sarif
        run: |
          if [ -s snyk-code.sarif ] && head -c 1 snyk-code.sarif | grep -q '^{' && grep -q '"results"' snyk-code.sarif && ! grep -q '"runs": *\[\]' snyk-code.sarif; then
            echo "sarif_valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No valid Snyk SARIF findings — skipping Code Scanning upload."
            echo "sarif_valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: steps.token.outputs.present == 'true' && steps.validate_sarif.outputs.sarif_valid == 'true'
        uses: github/codeql-action/upload-sarif@e2b3eafc8d227b0241d48be5f425d47c2d750a13 # v3.26.10
        with:
          sarif_file: snyk-code.sarif
