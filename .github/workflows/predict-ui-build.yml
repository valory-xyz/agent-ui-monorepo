name: Build and Release Predict UI

on:
  push:
    tags:
      - 'v*-omenstrat-trader'
      - 'v*-polystrat-trader'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-app.yml
    permissions:
      contents: write
    with:
      app-name: predict-ui
      # Tag suffix → REACT_APP_AGENT_NAME mapping.
      agent-env: ${{ endsWith(github.ref_name, '-omenstrat-trader') && 'omenstrat_trader' || 'polystrat_trader' }}
