name: Supply Chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 07:17 UTC. Catches newly-disclosed advisories against
    # the existing lockfile without waiting for the next PR. The unusual
    # minute (17) is to avoid the on-the-hour cron-storm on GitHub Actions
    # runners.
    - cron: '17 7 * * 1'

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit (production tree)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: .nvmrc

      - name: Activate pinned Yarn via Corepack
        # Without corepack activation, the `packageManager` pin in
        # package.json is silently ignored — yarn falls back to whatever
        # version ships with the runner image.
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          actual="$(yarn --version)"
          [ "$actual" = "1.22.22" ] || { echo "::error::corepack activation failed (got $actual)"; exit 1; }

      # NO `yarn install` — `yarn audit` reads `yarn.lock` directly via the
      # npm advisory database. Skipping install means a compromised
      # postinstall cannot run inside the gate that exists to detect
      # compromised postinstalls. `npm audit signatures` (which needs an
      # installed tree) runs in the `install-hooks` job instead.
      - name: yarn audit:prod (high/critical in production tree, with allowlist)
        run: yarn audit:prod

  install-hooks:
    name: Install-hook audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: .nvmrc

      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }

      # `--ignore-scripts` keeps any postinstall from firing on the runner
      # before the audit gate has classified it. The script walks
      # node_modules to find install-hook declarations, which is
      # independent of whether the hooks ran.
      - name: Install dependencies (no scripts)
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Audit install hooks against allowlist
        run: yarn audit:install-hooks

      # `npm audit signatures` lives here, not in the `audit` job, because it
      # needs a populated node_modules to enumerate installed packages. The
      # --ignore-scripts install above gives us the tree without running any
      # hook code, which preserves the same security property as the audit job.
      - name: npm audit signatures (registry-signed packages)
        run: npm audit signatures

  lockfile-lint:
    name: Lockfile validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: .nvmrc

      - name: lockfile-lint (HTTPS-only registry hosts, integrity hashes)
        run: |
          npx --yes lockfile-lint \
            --path yarn.lock \
            --type yarn \
            --validate-https \
            --allowed-hosts yarn npm \
            --empty-hostname false

  all-checks-passed:
    # Distinct from `check-pull-request.yml`'s "All checks passed" so branch
    # protection can require both as separate, unambiguous required-check
    # contexts.
    name: Supply chain checks passed
    needs: [audit, install-hooks, lockfile-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed"
            exit 1
          fi

  # Weekly-cron-only alert. Opens (or appends to) a GitHub Issue when any
  # required gate fails on a scheduled run, so a silent regression on main
  # doesn't go unnoticed between PRs. Deliberately scoped to schedule
  # events — failures on PRs are already surfaced by the PR check status.
  alert-on-cron-failure:
    name: Alert on weekly audit failure
    needs: [audit, install-hooks, lockfile-lint]
    # Fire on any non-success terminal state, not just 'failure'. A cancelled
    # or skipped required job (runner outage, infra issue) is exactly the
    # silent-regression mode this alert is meant to catch — narrowing to
    # 'failure' only would let those slip through.
    if: |
      github.event_name == 'schedule' &&
      (needs.audit.result != 'success' ||
       needs.install-hooks.result != 'success' ||
       needs.lockfile-lint.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const failures = [];
            const flag = (name, result) => {
              if (result !== 'success') failures.push(`\`${name}\` (${result})`);
            };
            flag('Dependency audit (production tree)', '${{ needs.audit.result }}');
            flag('Install-hook audit',                  '${{ needs.install-hooks.result }}');
            flag('Lockfile validation',                 '${{ needs.lockfile-lint.result }}');

            const titlePrefix = '[supply-chain] Weekly audit failed';
            const date = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${date})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const policyUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/SUPPLY-CHAIN-SECURITY.md`;

            const body = [
              `The weekly supply-chain cron audit did not pass cleanly on \`main\`.`,
              ``,
              `**Required jobs that did not succeed:**`,
              ...failures.map((f) => `- ${f}`),
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `**Likely causes:**`,
              `- A new high/critical advisory was disclosed against an existing dep → see Dependency audit logs; either bump the dep or add a documented entry to \`.supply-chain/audit-allowlist.json\`.`,
              `- An install hook in a transitive dep changed → run \`yarn audit:install-hooks:update\` after diagnosing whether the hook is legitimate.`,
              `- A non-HTTPS \`resolved\` URL appeared in \`yarn.lock\` → inspect the offending entry; rare in practice.`,
              `- The required job was cancelled or skipped (e.g., runner outage, transient infra issue) — re-run the workflow from the linked run page to confirm.`,
              ``,
              `Follow the response playbook in [SUPPLY-CHAIN-SECURITY.md](${policyUrl}) once the root cause is identified.`,
            ].join('\n');

            // Idempotence: only one open tracking issue at a time. If one
            // exists, append a comment with the new run link rather than
            // opening a fresh issue every Monday.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = openIssues.find((i) => i.title.startsWith(titlePrefix) && !i.pull_request);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Weekly audit failed again on ${date}.\n\n${body}`,
              });
              core.notice(`Appended failure note to existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              core.notice(`Opened tracking issue #${created.number}`);
            }
